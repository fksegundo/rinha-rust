version: "3.9"

services:
  api1:
    image: ${APP_PERF_IMAGE:-rinha-rust-api:perf}
    build:
      context: .
      dockerfile: submission/Dockerfile.perf
    environment:
      RINHA_FD_SOCKET: /sockets/api1.sock
      RINHA_SEARCH_MODE: "${RINHA_SEARCH_MODE:-key-first}"
      RINHA_THREAD_POOL_SIZE: "${API_THREAD_POOL_SIZE:-32}"
      RINHA_MLOCK_INDEX: "${RINHA_MLOCK_INDEX:-0}"
    volumes:
      - sockets:/sockets
    cpuset: "${API1_CPUSET:-}"
    cap_add:
      - ${API_CAP_IPC_LOCK:-}
    ulimits:
      memlock: ${API_MEMLOCK_ULIMIT:--1}
    deploy:
      resources:
        limits:
          cpus: "${API_CPU_LIMIT:-0.42}"
          memory: "${API_MEMORY_LIMIT:-165M}"

  api2:
    image: ${APP_PERF_IMAGE:-rinha-rust-api:perf}
    build:
      context: .
      dockerfile: submission/Dockerfile.perf
    environment:
      RINHA_FD_SOCKET: /sockets/api2.sock
      RINHA_SEARCH_MODE: "${RINHA_SEARCH_MODE:-key-first}"
      RINHA_THREAD_POOL_SIZE: "${API_THREAD_POOL_SIZE:-32}"
      RINHA_MLOCK_INDEX: "${RINHA_MLOCK_INDEX:-0}"
    volumes:
      - sockets:/sockets
    cpuset: "${API2_CPUSET:-}"
    cap_add:
      - ${API_CAP_IPC_LOCK:-}
    ulimits:
      memlock: ${API_MEMLOCK_ULIMIT:--1}
    deploy:
      resources:
        limits:
          cpus: "${API_CPU_LIMIT:-0.42}"
          memory: "${API_MEMORY_LIMIT:-165M}"

  lb:
    image: ${LB_PERF_IMAGE:-rinha-lb:perf}
    ports:
      - "9999:9999"
    environment:
      PORT: "9999"
      FD_UPSTREAMS: /sockets/api1.sock,/sockets/api2.sock
      WORKERS: "${LB_WORKERS:-2}"
      RINHA_LB_SO_INCOMING_CPU: "${LB_SO_INCOMING_CPU:-0}"
      RINHA_LB_CPU_AFFINITY: "${LB_CPU_AFFINITY:-}"
    volumes:
      - sockets:/sockets
    cpuset: "${LB_CPUSET:-}"
    deploy:
      resources:
        limits:
          cpus: "${LB_CPU_LIMIT:-0.16}"
          memory: "${LB_MEMORY_LIMIT:-20M}"
    depends_on:
      - api1
      - api2

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: size=10m
